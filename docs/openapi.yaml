            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /schemas/{id}:
    get:
      tags: [Schemas]
      summary: Get schema details
      description: Returns a specific schema with its validations
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Schema details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
        '404':
          $ref: '#/components/responses/NotFoundError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

    delete:
      tags: [Schemas]
      summary: Delete a schema
      description: Deletes one of the authenticated user's schemas
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Schema deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        '404':
          $ref: '#/components/responses/NotFoundError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  # ============================================
  # Progress (Protected)
  # ============================================
  /progress:
    get:
      tags: [Progress]
      summary: Get user progress
      description: Returns the authenticated user's academic progress
      security:
        - BearerAuth: []
      responses:
        '200':
          description: User progress
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /progress/learning-path:
    get:
      tags: [Progress]
      summary: Get learning path
      description: Returns the recommended learning path based on user progress
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Learning path
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  # ============================================
  # Quests (Protected)
  # ============================================
  /quests:
    get:
      tags: [Quests]
      summary: List all quests
      description: Returns paginated list of active quests
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of quests
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Quest'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /quests/{id}:
    get:
      tags: [Quests]
      summary: Get quest details
      description: Returns detailed information about a specific quest
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Quest details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    allOf:
                      - $ref: '#/components/schemas/Quest'
                      - type: object
                        properties:
                          initial_schema_json:
                            type: object
        '404':
          $ref: '#/components/responses/NotFoundError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /quests/{id}/start:
    post:
      tags: [Quests]
      summary: Start a quest
      description: Creates a new attempt for the specified quest
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '201':
          description: Quest started
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                  message:
                    type: string
        '409':
          description: Active attempt already exists
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /quests/{id}/submit:
    post:
      tags: [Quests]
      summary: Submit quest answer
      description: Submits an answer for an active quest attempt
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [answer]
              properties:
                answer:
                  type: object
                hints_used:
                  type: integer
                  minimum: 0
      responses:
        '200':
          description: Quest submitted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      attempt_id:
                        type: integer
                      status:
                        type: string
                      score:
                        type: integer
                      xp_earned:
                        type: integer
                  message:
                    type: string
        '400':
          description: No active attempt found
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /leaderboard:
    get:
      tags: [Quests]
      summary: Get leaderboard
      description: Returns top 20 users ranked by XP
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Leaderboard
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/LeaderboardEntry'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

