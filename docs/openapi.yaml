        '200':
          description: User achievements
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
        '404':
          $ref: '#/components/responses/NotFoundError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  # ============================================
  # Admin (Protected + Admin)
  # ============================================
  /admin/dashboard:
    get:
      tags: [Admin]
      summary: Admin dashboard stats
      description: Returns aggregate statistics for the admin dashboard
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Dashboard statistics
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/AdminDashboard'
        '403':
          description: Forbidden (not admin)
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /admin/users:
    get:
      tags: [Admin]
      summary: List all users
      description: Returns paginated list of all users with schema counts
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
        '403':
          description: Forbidden (not admin)
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /admin/users/{id}/toggle:
    post:
      tags: [Admin]
      summary: Toggle user active status
      description: Enables or disables a user account
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: User status toggled
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        '404':
          $ref: '#/components/responses/NotFoundError'
        '403':
          description: Forbidden (not admin)
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /admin/blocked-terms:
    get:
      tags: [Admin]
      summary: List blocked terms
      description: Returns all blocked terms grouped by category
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of blocked terms
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/BlockedTerm'
        '403':
          description: Forbidden (not admin)
        '401':
          $ref: '#/components/responses/UnauthorizedError'

    post:
      tags: [Admin]
      summary: Add blocked term
      description: Adds a new term to the blocked terms list
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [term, category, severity]
              properties:
                term:
                  type: string
                  maxLength: 100
                category:
                  type: string
                  maxLength: 50
                severity:
                  type: string
                  enum: [low, medium, high]
                description:
                  type: string
      responses:
        '201':
          description: Term added
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/BlockedTerm'
        '403':
          description: Forbidden (not admin)
        '422':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /admin/blocked-terms/{id}:
    delete:
      tags: [Admin]
      summary: Remove blocked term
      description: Deletes a blocked term by ID
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Term removed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        '404':
          $ref: '#/components/responses/NotFoundError'
        '403':
          description: Forbidden (not admin)
        '401':
          $ref: '#/components/responses/UnauthorizedError'
